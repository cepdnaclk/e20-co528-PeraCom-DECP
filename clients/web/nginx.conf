server {
    listen 80;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This line is the magic fix for SPAs:
        try_files $uri $uri/ /index.html;
    }

    # Optional: Handle API proxying to your Kong gateway
    location /api/ {
        proxy_pass http://decp-kong:8000/;
    }
}